- hosts: k8
  become: true

  tasks:
    - name: create new deployment
      command: kubectl apply -f /home/ubuntu/Deployment.yml

    - name: create new service
      command: kubectl apply -f /home/ubuntu/Service.yml
    
    - name: Check pods
      command: kubectl get pods
      register: output

    - debug:
        var: output.stdout_lines
